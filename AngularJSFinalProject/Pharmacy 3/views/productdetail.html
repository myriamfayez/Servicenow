<div class="container mt-4 vh-100" ng-controller="productDetailController">

<div class="row" ng-if="product.id">

<div class="col-sm-12 col-md-5 text-center mb-4">
<img ng-src="{{product.img}}" img-fallback class="img-fluid" style="max-height:400px; object-fit:contain;">
</div>

<div class="col-sm-12 col-md-7">

<h2>{{product.name}}</h2>

<span class="badge bg-secondary mb-3">{{product.category}}</span>

<h3 class="text-success mb-3">{{product.price}} LE</h3>

<p>
<strong>Stock:</strong>
<span ng-if="product.stock > 5" class="text-success">In Stock ({{product.stock}} available)</span>
<span ng-if="product.stock <= 5 && product.stock > 0" class="text-warning">Low Stock ({{product.stock}} left)</span>
<span ng-if="product.stock === 0" class="text-danger">Out of Stock</span>
</p>

<hr>

<div class="mt-3">

<div ng-if="!cart[product.id]">
<button class="btn btn-success btn-lg" ng-click="addToCart(product)"
ng-disabled="product.stock === 0">
<i class="fa-solid fa-cart-plus me-2"></i>Add to Cart
</button>
</div>

<div ng-if="cart[product.id]" class="d-flex align-items-center gap-3">

<button class="btn btn-outline-secondary"
ng-click="decreaseQty(product)">
<i class="fa-solid fa-minus"></i>
</button>

<strong style="font-size:20px;">{{cart[product.id].qty}}</strong>

<button class="btn btn-outline-secondary"
ng-click="increaseQty(product)"
ng-disabled="cart[product.id].qty >= product.stock">
<i class="fa-solid fa-plus"></i>
</button>

</div>

<button class="btn btn-outline-danger mt-3" ng-click="toggleFavorite(product)">
<i ng-if="!product.liked" class="fa-regular fa-heart me-1"></i>
<i ng-if="product.liked" class="fa-solid fa-heart me-1"></i>
Add to Favorites
</button>

</div>

</div>

</div>

<hr class="my-5">

<h3 class="mb-4">Related Products</h3>

<div ng-if="loadingRelated" class="text-center py-4">
<div class="spinner-border text-success" role="status"></div>
</div>

<div class="d-flex overflow-auto pb-4 gap-3 hide-scrollbar" ng-if="!loadingRelated && relatedProducts.length > 0">
  
  <div class="card product-card flex-shrink-0" style="width: 250px;" ng-repeat="p in relatedProducts">
    
    <a href="#!/product/{{p.id}}">
      <img ng-src="{{p.img}}" img-fallback class="card-img-top" style="height:150px; object-fit:contain; padding:10px;">
    </a>
    
    <div class="card-body text-center">
      <h6 style="height:48px; overflow:hidden; font-size:14px;">{{p.name}}</h6>
      <div class="fw-bold text-success">{{p.price}} LE</div>
    </div>
    
  </div>

</div>

<div ng-if="!loadingRelated && relatedProducts.length === 0" class="text-muted text-center py-4">
  No related products found.
</div>

<style>
.hide-scrollbar::-webkit-scrollbar {
  display: none;
}
.hide-scrollbar {
  -ms-overflow-style: none;
  scrollbar-width: none;
}
</style>

</div>

<div ng-if="!product.id" class="text-center mt-5">
<p class="text-muted">Loading product...</p>
</div>

</div>
