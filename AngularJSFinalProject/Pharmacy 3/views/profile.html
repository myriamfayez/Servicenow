<div class="container mt-4 vh-100" ng-controller="profileController">

<div class="row">

<div class="col-md-4 mb-4">

<div class="card p-4 text-center">

<div class="mb-3">
<i class="fa-solid fa-user-circle" style="font-size:80px; color:#198754;"></i>
</div>

<h4>{{username}}</h4>
<p class="text-muted">{{email}}</p>

<span class="badge bg-success">{{role}}</span>

</div>

</div>


<div class="col-md-8">

<div class="card p-4">

<h4 class="mb-3"><i class="fa-solid fa-clock-rotate-left me-2"></i>Order History</h4>

<div ng-if="orders.length === 0" class="text-center text-muted py-4">
<p>No orders yet</p>
<a href="#!/beauty" class="btn btn-outline-success">Start Shopping</a>
</div>

<div class="table-responsive" ng-if="orders.length > 0">
<table class="table">
<thead>
<tr>
<th>Order #</th>
<th>Date</th>
<th>Items</th>
<th>Total</th>
<th>Status</th>
</tr>
</thead>
<tbody>
<tr ng-repeat="order in orders">
<td>#{{order.id}}</td>
<td>{{order.created_at | date:'dd/MM/yyyy'}}</td>
<td>{{order.items.length}} items</td>
<td class="fw-bold">{{order.total}} LE</td>
<td>
<span class="badge"
ng-class="{
'bg-success': order.status === 'completed',
'bg-warning': order.status === 'pending',
'bg-danger': order.status === 'cancelled'
}">
{{order.status}}
</span>
</td>
</tr>
</tbody>
</table>
</div>

</div>

</div>

</div>

</div>
