<!DOCTYPE html>
<html ng-app="myApp">
<head>
  <meta charset="UTF-8">
  <title>Products</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

  <style>
    .custom-card {
      transition: 0.3s;
      border-radius: 15px;
    }

    .price {
      color: black;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>

<body ng-controller="myCtrl">

<div class="container py-5">
  <h2 class="text-center mb-5">Products</h2>

  <div class="row">
    <div class="col-md-4 mb-4" ng-repeat="product in products">
      
      <div class="card custom-card p-3">
        <img ng-src="{{product.image}}" 
             class="card-img-top" 
             height="200" 
             style="object-fit:cover;">
        
        <div class="card-body text-center">
          <h5 class="card-title">{{product.title}}</h5>
          <p class="price">{{product.price}} EGP</p>




          <h6>Count = {{product.count}}</h6>

          <div class="d-flex justify-content-center gap-2 mb-3">
            <button class="btn btn-success"
                    ng-click="product.count = product.count + 1">
              +
            </button>

            <button class="btn btn-danger"
                    ng-click="product.count = product.count - 1"
                    ng-disabled="product.count == 0">
              -
            </button>
          </div>

          <button class="btn btn-primary">
            Add To Cart
          </button>
        </div>
      </div>

    </div>
  </div>
</div>
