<!DOCTYPE html>
<html lang="en" ng-app="myApp">
<head>
  <meta charset="UTF-8">
  <title>Users Management</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>

<body ng-controller="myCtrl">

<div class="container mt-5">

  <h2 class="mb-3">Users</h2>

  <p class="text-primary" ng-if="loading">Loading...</p>
  <p class="text-danger" ng-if="error">{{ error }}</p>




  <form name="userForm" ng-submit="submitForm()" novalidate class="mb-4">

    <input type="hidden" ng-model="formData.id">

    <div class="mb-3">
      <label>Name</label>
      <input type="text"
             ng-model="formData.name"
             class="form-control"
             name="name"
             required>
    </div>

    <div class="mb-3">
      <label>Email</label>
      <input type="email"
             ng-model="formData.email"
             class="form-control"
             name="email"
             required>
    </div>

    <button type="submit" class="btn btn-primary">
      {{ isEdit ? 'Update User' : 'Add User' }}
    </button>

    <button type="button"
            class="btn btn-secondary ms-2"
            ng-if="isEdit"
            ng-click="cancelEdit()">
      Cancel
    </button>
  </form>



  <table class="table table-striped">
    <thead>
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>Email</th>
        <th>Created at</th>
      
      </tr>
    </thead>

    <tbody>
      <tr ng-repeat="user in users">
        <th>{{$index + 1}}</th>
        <td>{{ user.name }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.created_at }}</td>
        <td>
          <button class="btn btn-warning btn-sm" ng-click="editUser(user)">Edit</button>
          <button class="btn btn-danger btn-sm" ng-click="deleteUser(user.id)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

</div>

<script>
let app = angular.module("myApp", []);

app.service("userService", function($http) {

  const apiLink = "https://spnuxpfrtluagbirquiv.supabase.co/rest/v1/users";
  const apiKey = "sb_publishable_iBx7OvsnV3GiQw4FKLhWKA_p4QpRnKo";

  const headers = {
    "apikey": apiKey,
    "Authorization": "Bearer " + apiKey,
    "Content-Type": "application/json",
    "Prefer": "return=representation"
  };

  this.getUsers = function() {
    return $http.get(apiLink + "?select=*", { headers: headers });
  };

  this.createUser = function(user) {
    return $http.post(apiLink, user, { headers: headers });
  };

  this.updateUser = function(id, user) {
    return $http.patch(apiLink + "?id=eq." + id, user, { headers: headers });
  };

  this.deleteUser = function(id) {
    return $http.delete(apiLink + "?id=eq." + id, { headers: headers });
  };
});

app.controller("myCtrl", function($scope, userService) {

  $scope.users = [];
  $scope.formData = { name: '', email: '' };
  $scope.loading = false;
  $scope.error = null;
  $scope.isEdit = false;

  function loadUsers() {
    $scope.loading = true;
    userService.getUsers()
      .then(res => $scope.users = res.data)
      .catch(() => $scope.error = "Error loading users")
      .finally(() => $scope.loading = false);
  }

  loadUsers();



  $scope.editUser = function(user) {
    $scope.isEdit = true;
    $scope.formData = angular.copy(user); 
  };

  $scope.cancelEdit = function() {
    $scope.isEdit = false;
    $scope.formData = { name: '', email: '' };
  };

  $scope.submitForm = function() {

    if ($scope.userForm.$invalid) {
      $scope.userForm.$setTouched();
      return;
    }

    $scope.loading = true;
    $scope.error = null;

    if ($scope.isEdit) {



      userService.updateUser($scope.formData.id, {
        name: $scope.formData.name,
        email: $scope.formData.email
      })
      .then(() => {
        $scope.isEdit = false;
        $scope.formData = { name: '', email: '' };
        loadUsers();   

      })
      .catch(() => $scope.error = "Error updating user")
      .finally(() => $scope.loading = false);

    } else {



        userService.createUser($scope.formData)
        .then(res => {
          if (res.data.length > 0) {
            $scope.users.push(res.data[0]);
          }
          $scope.formData = { name: '', email: '' };
        })
        .catch(() => $scope.error = "Error creating user")
        .finally(() => $scope.loading = false);
    }
  };

  $scope.deleteUser = function(id) {
    if (!confirm("Confirm delete")) return;

    $scope.loading = true;
    $scope.error = null;

    userService.deleteUser(id)
      .then(() => {
        $scope.users = $scope.users.filter(u => u.id !== id);
      })
      .catch(() => $scope.error = "Error deleting user")
      .finally(() => $scope.loading = false);
  };

});
</script>

</body>
</html>
