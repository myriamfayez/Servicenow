<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Angular--Js</title>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: beige;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            width: 320px;
            border-radius: 10px;
        }

        .btn-custom {
            background-color: beige;
            color: black;
            border-radius: 1px;
        }

        .btn-custom:disabled {
            background-color: #ddd;
        }

        .welcome {
            margin-top: 15px;
            color: #333;
            font-weight: bold;
        }

        .error {
            color: red;
            font-size: 12px;
        }
    </style>
</head>

<body ng-app="myApp" ng-controller="myCtrl" class="d-flex justify-content-center align-items-center">

    <div class="login-box text-center shadow-sm">

        <h3 class="mb-3">Login</h3>

        <form name="loginForm" novalidate>

            <input 
                type="email"   
                class="form-control w-50 mx-auto mb-2"
                placeholder="mail"  
                ng-model="email"
                name="email"
                required>

            <div class="error" ng-show="loginForm.email.$touched && loginForm.email.$invalid">
                email required
            </div>

            <input 
                type="password" 
                class="form-control w-50 mx-auto mb-2"
                placeholder="pass" 
                ng-model="password"
                name="password"
                required>

            <div class="error" ng-show="loginForm.password.$touched && loginForm.password.$invalid">
                password  required
            </div>

            <div class="form-check d-flex justify-content-center my-2">
                <input class="form-check-input me-2" type="checkbox" ng-model="rememberMe" id="remember">
                <label class="form-check-label" for="remember">
                    Remember me
                </label>
            </div>

            <button 
                type="button"
                class="btn btn-custom w-50"
                ng-click="login()" 
                ng-disabled="loginForm.$invalid">
                Login
            </button>

        </form>

        <div class="welcome" ng-if="message">
            {{message}}
        </div>

        <div class="welcome" ng-show="rememberMe">
            will remember you next time
        </div>

    </div>

<script>
var app = angular.module("myApp", []);

app.controller("myCtrl", function($scope) {

    $scope.login = function() {
        if ($scope.email && $scope.password) {
            $scope.message = "welcome " + $scope.email;
        } else {
            $scope.message = "please add email & password";
        }
    };

});
</script>

</body>
</html>
