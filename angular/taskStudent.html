<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Angular--Js</title>

  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f7fb;
      min-height: 100vh;
    }

    .card-soft {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    .title {
      color: black;
      font-weight: 600;
      letter-spacing: .5px;
    }

    .form-control {
      border-radius: 10px;
      border: 1px solid #e2e8f0;
    }

    .form-control:focus {
      border-color: black;
      box-shadow: 0 0 0 0.15rem rgba(56, 161, 105, 0.15);
    }

    .btn-soft {
      background: linear-gradient(135deg, #38a169, #68d391);
      border: none;
      color: #fff;
      border-radius: 10px;
      padding: 8px 24px;
    }

    .btn-soft:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .errormsg span {
      display: block;
      font-size: 0.85rem;
    }

    .list-group-item {
      border: none;
      border-radius: 12px;
      margin-bottom: 10px;
      background: #f8fafc;
    }

    .btn-delete {
      background: #feb2b2;
      border: none;
      color: #7b1c1c;
      border-radius: 8px;
    }

    .btn-delete:hover {
      background: #fc8181;
      color: #fff;
    }
  </style>
</head>

<body ng-app="myapp" ng-controller="myctrl">

  <div class="container">
    <div class="card-soft mt-5 p-4">
      <h4 class="title mb-4 text-center">Add Student</h4>

      <form name="studentform" novalidate> 
        <div class="mb-3 row">
          <label class="col-sm-2 col-form-label">Name</label>
          <div class="col-sm-10">
            <input type="text"
                   class="form-control"
                   ng-model="inputsudentname"
                   placeholder="Student Name"
                   name="inputsudentname"
                   required
                   ng-minlength="3"
                   ng-pattern="/^[A-Za-z\u0600-\u06FF ]+$/">

            <div class="errormsg mt-2">
              <span class="text-danger"
                    ng-if="studentform.inputsudentname.$dirty 
                           && studentform.inputsudentname.$error.required">
                Name required
              </span>

              <span class="text-danger"
                    ng-if="studentform.inputsudentname.$dirty 
                           && !studentform.inputsudentname.$error.required
                           && studentform.inputsudentname.$error.minlength">
                Min 3 letters
              </span>

              <span class="text-danger"
                    ng-if="studentform.inputsudentname.$dirty 
                           && !studentform.inputsudentname.$error.required
                           && !studentform.inputsudentname.$error.minlength
                           && studentform.inputsudentname.$error.pattern">
                No numbers or signs
              </span>
            </div>
          </div>

          <div class="btn d-flex justify-content-center align-items-center mt-3">
            <button type="button"
                    ng-click="addstudent()"
                    ng-disabled="studentform.$invalid"
                    class="btn btn-soft">
              Add
            </button>
          </div>
        </div>
      </form>
    </div>

    <div class="list m-3 p-3">
      <ul class="list-unstyled mt-3">
        <li class="list-group-item d-flex justify-content-between align-items-center"
            ng-repeat="Student in students track by $index">
          {{Student}}
          <button class="btn btn-delete btn-sm"
                  ng-click="deletestudent($index)">
            Delete
          </button>
        </li>
      </ul>
    </div>
  </div>

  <script>
    var app = angular.module("myapp",[]);
    app.controller("myctrl", function($scope) {

      $scope.students = [];  
      $scope.inputsudentname = "";

      $scope.addstudent = function() {
        if ($scope.studentform.$invalid) return;

        $scope.students.push($scope.inputsudentname);
        $scope.inputsudentname = "";

        $scope.studentform.$setPristine();
        $scope.studentform.$setUntouched();
      };

      $scope.deletestudent = function(index) {
        $scope.students.splice(index, 1);
      };
    });
  </script>

</body>
</html>
