<h3>User Details</h3>

<div ng-if="user">
    <p><strong>Name:</strong> {{user.name}}</p>
    <p><strong>Email:</strong> {{user.email}}</p>
    <p><strong>Created At:</strong> {{user.created_at | date:'short'}}</p>

    <a href="#!/" class="btn btn-primary mt-3">
        Back to Users
    </a>
</div>
