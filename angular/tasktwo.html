<!DOCTYPE html>
<html ng-app="myApp">
<head>
  <meta charset="UTF-8">
  <title>Todo List </title>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background:#f4f7fb; }
    .card { border-radius: 12px; }
    .done { color: #6c757d; } 
    .btn-delete {
      background: #feb2b2;
      border: none;
      color: #7b1c1c;
      border-radius: 6px;
    }
  </style>
</head>

<body ng-controller="MainCtrl">

<div class="container py-5">
  <todo-list tasks="tasks"></todo-list>
</div>











<script>
var app = angular.module("myApp", []);

app.controller("MainCtrl", function($scope) {
  $scope.tasks = [
    { title: "AngularJS", done: false },
    { title: "Directives", done: true },
    { title: "Jelly-script", done: false }
  ];
});

app.directive("todoList", function() {
  return {
    restrict: "E",
    scope: {
      tasks: "="
    },


    template: `
      <div class="card p-3 shadow-sm">
        <h5 class="mb-3"> Tasks</h5>

        <div class="d-flex mb-3">
          <input type="text" class="form-control me-2"
                 placeholder="Task"
                 ng-model="newTask">
          <button class="btn btn-success"
                  ng-click="addTask()">Add</button>
        </div>

        <ul class="list-unstyled">
          <li ng-repeat="task in tasks track by $index"
              class="d-flex align-items-center mb-2">

            <input type="checkbox"
                   class="form-check-input me-2"
                   ng-model="task.done">

            <span ng-class="{'done': task.done}">
              {{task.title}}
            </span>

            <button class="btn btn-delete btn-sm ms-auto"
                    ng-click="deleteTask($index)">
              ✖
            </button>
          </li>
        </ul>
      </div>
    `,
    controller: function($scope) {

      $scope.addTask = function() {
        if (!$scope.newTask) return;

        $scope.tasks.push({
          title: $scope.newTask,
          done: false
        });

        $scope.newTask = "";
      };

      $scope.deleteTask = function(index) {
        $scope.tasks.splice(index, 1);
      };
    }
  };
});
</script>

</body>
</html>
